<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repoviewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  /* === SIDEBAR === */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #0d1117;
    border-right: 1px solid #21262d;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
    overflow-y: auto;
  }
  #sidebar-header { display: flex; align-items: center; gap: 8px; }
  #sidebar-header a {
    color: #8b949e;
    text-decoration: none;
    font-size: 18px;
    line-height: 1;
  }
  #sidebar-header a:hover { color: #58a6ff; }
  #sidebar-header h1 {
    font-size: 15px;
    color: #e6edf3;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sidebar-section {
    border-top: 1px solid #21262d;
    padding-top: 12px;
  }
  .sidebar-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #484f58;
    margin-bottom: 8px;
  }

  /* Info box */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-item { font-size: 12px; }
  .info-value { color: #e6edf3; font-size: 14px; font-weight: 600; }
  .info-label { color: #484f58; font-size: 10px; }

  /* Commit info */
  #commit-msg {
    font-size: 12px;
    color: #c9d1d9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #commit-meta {
    font-size: 11px;
    color: #484f58;
    margin-top: 4px;
  }
  #commit-meta span { color: #58a6ff; }

  /* Controls */
  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-row label {
    font-size: 11px;
    color: #8b949e;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .control-row select, .control-row input[type="checkbox"] {
    accent-color: #58a6ff;
  }
  .mode-select {
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }

  /* Playback */
  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #play-btn {
    background: none;
    border: 1px solid #30363d;
    color: #c9d1d9;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  #play-btn:hover { border-color: #58a6ff; }
  #timeline {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #timeline::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
  }
  /* Legend */
  #legend { font-size: 11px; color: #8b949e; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* === CANVAS AREA === */
  #canvas-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #191942;
  }
  canvas { display: block; }

  /* === TOOLTIP === */
  #tooltip {
    position: fixed;
    display: none;
    background: rgba(22,27,34,0.95);
    border: 1px solid #30363d;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    max-width: 300px;
    line-height: 1.5;
  }
  #tooltip .filepath { color: #58a6ff; font-weight: 600; }
  #tooltip .detail { color: #8b949e; }

  /* === LOADING === */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-size: 16px;
    color: #8b949e;
    z-index: 200;
    background: #0d1117;
  }
  #loading .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #progress-bar {
    width: 280px;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: #58a6ff;
    transition: width 0.2s ease-out;
  }
  #progress-detail {
    font-size: 12px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">Loading repository data...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-detail"></div>
</div>

<div id="app" style="display:none">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <a href="/" title="Back to home">&larr;</a>
      <h1 id="repo-name"></h1>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Info</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-value" id="info-files">-</div><div class="info-label">files</div></div>
        <div class="info-item"><div class="info-value" id="info-lines">-</div><div class="info-label">lines</div></div>
        <div class="info-item"><div class="info-value" id="info-commits">-</div><div class="info-label">commits</div></div>
        <div class="info-item"><div class="info-value" id="info-frame">-</div><div class="info-label">current</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Commit</div>
      <div id="commit-msg">-</div>
      <div id="commit-meta"><span id="date-display">-</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Playback</div>
      <div id="controls">
        <button id="play-btn">&#9654;</button>
        <input type="range" id="timeline" min="0" max="1000" value="0">
      </div>
      <div id="time-display" style="font-size:11px;color:#8b949e;margin-top:4px;text-align:center">0:00 / 1:00</div>
      <div class="control-row" style="margin-top:8px">
        <select id="duration-select" class="mode-select">
          <option value="30000">30s</option>
          <option value="60000" selected>1 min</option>
          <option value="120000">2 min</option>
          <option value="300000">5 min</option>
        </select>
        <select id="playback-mode" class="mode-select">
          <option value="percommit">Per commit</option>
          <option value="temporal">Temporal</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Display</div>
      <div class="control-row">
        <select id="viz-mode" class="mode-select">
          <option value="growth">Growth (shows scale)</option>
          <option value="zoomout">Fit to canvas</option>
        </select>
      </div>
      <div class="control-row" style="margin-top:8px">
        <label><input type="checkbox" id="text-toggle"> Show file names</label>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Legend</div>
      <div id="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#2ecc71"></div> Fresh</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#3d6b3f"></div> Mature</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#6b5a3e"></div> Aging</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#8c7850"></div> Weathered</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#b2a480"></div> Legacy</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#afafa8"></div> Ancient</div>
      </div>
    </div>
  </div>

  <!-- Canvas viewer -->
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ===================== CONFIG =====================
const BLOCK_SIZE = 8;
const OCEAN_COLOR = '#191942';
const FILE_BORDER = 0.5; // thin border between files (px)
const ISLAND_GAP = 0;    // no gap — unified island

const AGE_STAGES = [
  { pos: 0.0,  r: 46,  g: 204, b: 113 }, // Fresh green
  { pos: 0.2,  r: 61,  g: 107, b: 63  }, // Mature dark green
  { pos: 0.4,  r: 107, g: 90,  b: 62  }, // Aging brown
  { pos: 0.6,  r: 140, g: 120, b: 80  }, // Weathered
  { pos: 0.8,  r: 178, g: 164, b: 128 }, // Legacy sandy beige
  { pos: 1.0,  r: 175, g: 175, b: 168 }, // Ancient light gray
];

// Folder hue tints — subtle shifts to differentiate territories without borders
const FOLDER_TINTS = [
  { r: 0, g: 0, b: 0 },      // no tint
  { r: 8, g: -4, b: -4 },    // warm
  { r: -4, g: 4, b: 8 },     // cool
  { r: 6, g: 6, b: -6 },     // yellow
  { r: -6, g: 4, b: 6 },     // teal
  { r: 6, g: -2, b: 6 },     // magenta
  { r: -4, g: 6, b: -2 },    // green
  { r: 4, g: -4, b: 8 },     // blue
];

// ===================== STATE =====================
let repoData = null;
let snapshots = [];
let playing = false;
let lastTimestamp = 0;
let hoveredFile = null;

// Film timeline (continuous video paradigm)
let filmDuration = 60000;         // default 1 minute (ms)
let filmTime = 0;                 // current position in film (0..filmDuration)
let playbackMode = 'percommit';   // 'percommit' or 'temporal'

// Derived from snapshots at init
let repoStartDate = 0;           // epoch ms of first commit
let repoEndDate = 0;             // epoch ms of last commit
let commitDates = [];             // epoch ms for each snapshot

// Layout cache (avoid recomputing treemaps every render frame)
let cachedPrevIdx = -1;
let cachedNextIdx = -1;
let cachedPrevLayout = null;
let cachedNextLayout = null;
let cachedTransitionMap = null;
let currentFrame = 0;             // derived from filmTime, for UI/tooltip

// Scaling / growth state
let zoomOutProgress = 0;
let vizMode = 'growth';
let showTextLabels = false;
let totalLinesPerFrame = [];
let finalFrameTotalLines = 1;
let currentRenderScale = 1;

// Canvas
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ===================== TIME MAPPING =====================
function getTimeMapping(ft) {
  const N = snapshots.length;
  if (N === 0) return { prevIdx: 0, nextIdx: 0, t: 0, repoTime: 0 };
  if (N === 1) return { prevIdx: 0, nextIdx: 0, t: 0, repoTime: commitDates[0] };

  const frac = clamp(ft / filmDuration, 0, 1);

  if (playbackMode === 'percommit') {
    const progress = frac * (N - 1);
    const prevIdx = Math.min(Math.floor(progress), N - 2);
    const nextIdx = Math.min(prevIdx + 1, N - 1);
    const t = progress - prevIdx;
    const repoTime = commitDates[prevIdx] + (commitDates[nextIdx] - commitDates[prevIdx]) * t;
    return { prevIdx, nextIdx, t, repoTime };
  } else {
    // Temporal mode: linear in real calendar time
    const repoTime = repoStartDate + frac * (repoEndDate - repoStartDate);
    // Binary search for last commit <= repoTime
    let lo = 0, hi = N - 1;
    while (lo < hi) {
      const mid = (lo + hi + 1) >> 1;
      if (commitDates[mid] <= repoTime) lo = mid;
      else hi = mid - 1;
    }
    const prevIdx = lo;
    const nextIdx = Math.min(prevIdx + 1, N - 1);
    if (prevIdx === nextIdx) return { prevIdx, nextIdx, t: 0, repoTime };
    const span = commitDates[nextIdx] - commitDates[prevIdx];
    const t = span > 0 ? (repoTime - commitDates[prevIdx]) / span : 0;
    return { prevIdx, nextIdx, t: clamp(t, 0, 1), repoTime };
  }
}

function ensureLayoutCache(prevIdx, nextIdx) {
  if (prevIdx === cachedPrevIdx && nextIdx === cachedNextIdx) return;

  if (prevIdx !== cachedPrevIdx) {
    cachedPrevLayout = computeTreemap(snapshots[prevIdx].files, canvas.width, canvas.height);
    islandBoundsCache.set(prevIdx, getIslandBounds(cachedPrevLayout));
  }
  if (nextIdx !== cachedNextIdx) {
    if (nextIdx === prevIdx) {
      cachedNextLayout = cachedPrevLayout;
    } else {
      cachedNextLayout = computeTreemap(snapshots[nextIdx].files, canvas.width, canvas.height);
      islandBoundsCache.set(nextIdx, getIslandBounds(cachedNextLayout));
    }
  }

  cachedTransitionMap = (prevIdx === nextIdx)
    ? null
    : buildTransitionMap(cachedPrevLayout, cachedNextLayout);
  cachedPrevIdx = prevIdx;
  cachedNextIdx = nextIdx;
}

function seekToFilmTime(t) {
  filmTime = clamp(t, 0, filmDuration);
  cachedPrevIdx = -1;
  cachedNextIdx = -1;
}

function seekToCommit(idx) {
  const N = snapshots.length;
  idx = clamp(idx, 0, N - 1);
  if (playbackMode === 'percommit') {
    filmTime = (idx / Math.max(1, N - 1)) * filmDuration;
  } else {
    const span = repoEndDate - repoStartDate;
    filmTime = span > 0 ? ((commitDates[idx] - repoStartDate) / span) * filmDuration : 0;
  }
  cachedPrevIdx = -1;
  cachedNextIdx = -1;
}

function formatFilmTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

// ===================== DATA LOADING =====================
function getRepoFromUrl() {
  const m = window.location.pathname.match(/^\/viz\/([^/]+)\/([^/]+)/);
  if (m) return { owner: m[1], repo: m[2] };
  const params = new URLSearchParams(window.location.search);
  if (params.get('owner') && params.get('repo')) return { owner: params.get('owner'), repo: params.get('repo') };
  return null;
}

function updateProgress(p) {
  let pct = 0;
  let msg = '';
  let detail = '';
  switch (p.stage) {
    case 'clone':           pct = 8;  msg = p.message || 'Cloning repository...'; break;
    case 'repo-info':       pct = 5;  msg = 'Fetching repo info...'; break;
    case 'tree':            pct = 12; msg = 'Reading file tree...'; break;
    case 'commits-list':    pct = 15; msg = 'Fetching commit list...'; break;
    case 'commits-detail':
      pct = 15 + (p.current / Math.max(p.total, 1)) * 75;
      msg = 'Parsing commits...';
      detail = p.total ? `${p.current} / ${p.total}` : `${p.current}`;
      break;
    case 'prs':             pct = 92; msg = 'Fetching pull requests...'; break;
    case 'done':            pct = 100; msg = 'Done.'; break;
  }
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-detail').textContent = detail;
}

function loadData() {
  const r = getRepoFromUrl();
  if (!r) return Promise.reject(new Error('No repository specified. Go to <a href="/">the home page</a> to pick one.'));
  document.title = `Repoviewer — ${r.owner}/${r.repo}`;
  return new Promise((resolve, reject) => {
    const es = new EventSource(`/api/repo/${r.owner}/${r.repo}/stream`);
    let settled = false;
    es.addEventListener('progress', (e) => {
      try { updateProgress(JSON.parse(e.data)); } catch {}
    });
    es.addEventListener('done', (e) => {
      settled = true;
      es.close();
      try { resolve(JSON.parse(e.data)); }
      catch (err) { reject(err); }
    });
    es.addEventListener('fail', (e) => {
      settled = true;
      es.close();
      let msg = 'Failed to fetch repository data';
      try { msg = JSON.parse(e.data).message || msg; } catch {}
      reject(new Error(msg));
    });
    es.onerror = () => {
      if (settled) return;
      es.close();
      reject(new Error('Connection to server lost'));
    };
  });
}

// ===================== PATCH PARSING =====================
function parseHunks(patch) {
  if (!patch) return [];
  const lines = patch.split('\n');
  const hunks = [];
  let current = null;

  for (const line of lines) {
    const m = line.match(/^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/);
    if (m) {
      current = {
        oldStart: parseInt(m[1]),
        oldCount: parseInt(m[2] ?? '1'),
        newStart: parseInt(m[3]),
        newCount: parseInt(m[4] ?? '1'),
        lines: [],
      };
      hunks.push(current);
    } else if (current) {
      if (line.startsWith('+'))      current.lines.push({ type: 'add' });
      else if (line.startsWith('-')) current.lines.push({ type: 'del' });
      else if (line.startsWith(' ')) current.lines.push({ type: 'ctx' });
      // ignore \ No newline at end of file
    }
  }
  return hunks;
}

function applyPatch(lineArray, patch, date, sha) {
  if (!patch) {
    // No patch data — mark all lines as touched
    return lineArray.map(() => ({ date, sha }));
  }

  const result = [...lineArray];
  const hunks = parseHunks(patch);
  let offset = 0;

  for (const hunk of hunks) {
    let pos = hunk.oldStart - 1 + offset;

    for (const line of hunk.lines) {
      if (line.type === 'ctx') {
        pos++;
      } else if (line.type === 'del') {
        if (pos < result.length) result.splice(pos, 1);
        offset--;
      } else if (line.type === 'add') {
        result.splice(pos, 0, { date, sha });
        pos++;
        offset++;
      }
    }
  }
  return result;
}

// ===================== SNAPSHOT BUILDER =====================
function buildSnapshots(data) {
  // fileStates: Map<filepath, [{date, sha}]> where index = line number
  const fileStates = new Map();
  // frozenBlame: Map<filepath, {lines, blame}> — shared refs for unchanged files.
  // Only files touched in a commit get a new blame array; everything else
  // reuses the reference from the previous snapshot (structural sharing).
  // This drops memory from O(snapshots × files × lines) → O(snapshots × changedFiles × lines + files × lines).
  const frozenBlame = new Map();
  const snaps = [];

  // Index PRs by merge SHA for O(1) lookup instead of O(n) find per commit
  const prBySha = new Map();
  for (const p of data.pullRequests) {
    if (p.mergeCommitSha) prBySha.set(p.mergeCommitSha, p);
  }

  for (const commit of data.commits) {
    const changed = { added: [], removed: [], modified: [] };
    const touchedPaths = new Set();

    for (const file of commit.files) {
      const key = file.filename;

      if (file.status === 'added') {
        const lines = Array(file.additions).fill({ date: commit.date, sha: commit.sha });
        fileStates.set(key, lines);
        changed.added.push(key);
        touchedPaths.add(key);

      } else if (file.status === 'removed') {
        changed.removed.push(key);
        fileStates.delete(key);
        frozenBlame.delete(key);
        touchedPaths.add(key);

      } else if (file.status === 'renamed') {
        const old = fileStates.get(file.previous_filename) || [];
        fileStates.delete(file.previous_filename);
        frozenBlame.delete(file.previous_filename);
        const newLines = applyPatch(old, file.patch, commit.date, commit.sha);
        fileStates.set(key, newLines);
        changed.removed.push(file.previous_filename);
        changed.added.push(key);
        touchedPaths.add(key);
        touchedPaths.add(file.previous_filename);

      } else {
        const old = fileStates.get(key) || [];
        const newLines = applyPatch(old, file.patch, commit.date, commit.sha);
        fileStates.set(key, newLines);
        changed.modified.push(key);
        touchedPaths.add(key);
      }
    }

    // Build snapshot with structural sharing — only copy touched files
    const filesSnapshot = {};
    for (const [path, lines] of fileStates) {
      if (touchedPaths.has(path)) {
        // File changed: create new blame snapshot and cache it
        const entry = { lines: lines.length, blame: [...lines] };
        frozenBlame.set(path, entry);
        filesSnapshot[path] = entry;
      } else {
        // File unchanged: reuse cached reference (zero allocation)
        filesSnapshot[path] = frozenBlame.get(path);
      }
    }

    snaps.push({
      sha: commit.sha,
      message: commit.message,
      date: commit.date,
      author: commit.author,
      files: filesSnapshot,
      changed,
      pr: prBySha.get(commit.sha) || null,
    });
  }

  return snaps;
}

// ===================== NOISE (for organic coastline) =====================
// Simple value noise — fast, good enough for coastline wobble
const _noiseP = [];
for (let i = 0; i < 256; i++) _noiseP.push(i);
for (let i = 255; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [_noiseP[i], _noiseP[j]] = [_noiseP[j], _noiseP[i]]; }
const _noisePerm = [..._noiseP, ..._noiseP];
function noise2D(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const aa = _noisePerm[_noisePerm[X] + Y], ab = _noisePerm[_noisePerm[X] + Y + 1];
  const ba = _noisePerm[_noisePerm[X + 1] + Y], bb = _noisePerm[_noisePerm[X + 1] + Y + 1];
  const l1 = aa / 255 + u * (ba / 255 - aa / 255);
  const l2 = ab / 255 + u * (bb / 255 - ab / 255);
  return l1 + v * (l2 - l1);
}

// ===================== MOUNTAIN ISLAND LAYOUT =====================
// Files placed side by side, heights proportional to size,
// smoothed so adjacent files don't differ too much.
// Stable positions: files never swap — tectonic plates, not rafts.

const MOUNTAIN_ALPHA = 0.5;
const MAX_ADJ_HEIGHT_DIFF = 32; // max pixel height difference between neighbors

// Persistent file order — computed once from final snapshot
let stableFileOrder = []; // array of file paths, left to right

function buildStableOrder(snapshots) {
  // Use the last snapshot to define the canonical layout
  const finalSnap = snapshots[snapshots.length - 1];
  const files = Object.entries(finalSnap.files).map(([path, f]) => ({
    path, value: Math.max(f.lines, 1),
  }));
  files.sort((a, b) => b.value - a.value);

  // Build center-out order: largest in center, alternate right/left
  const order = [];
  for (let i = 0; i < files.length; i++) {
    if (i === 0) {
      order.push(files[i].path);
    } else if (i % 2 === 1) {
      order.push(files[i].path); // right
    } else {
      order.unshift(files[i].path); // left
    }
  }
  return order;
}

function computeTreemap(filesObj, canvasW, canvasH) {
  const allFiles = [];
  for (const [path, file] of Object.entries(filesObj)) {
    const parts = path.split('/');
    const folder = parts.length > 1 ? parts[0] : '(root)';
    allFiles.push({
      path, blame: file.blame, lines: file.lines,
      value: Math.max(file.lines, 1), folder,
    });
  }
  if (allFiles.length === 0) return { files: [] };

  const fileMap = new Map(allFiles.map(f => [f.path, f]));

  // Assign folder indices
  const folderNames = [...new Set(allFiles.map(f => f.folder))].sort();
  for (const f of allFiles) f.folderIdx = folderNames.indexOf(f.folder);

  // Use stable order, filtering to only files present in this snapshot
  const orderedFiles = stableFileOrder
    .filter(p => fileMap.has(p))
    .map(p => fileMap.get(p));
  if (orderedFiles.length === 0) return { files: [] };

  const totalValue = orderedFiles.reduce((s, f) => s + f.value, 0);
  const maxValue = Math.max(...orderedFiles.map(f => f.value));

  // --- Fixed block sizes: each line = 1 block ---
  // File dimensions in blocks, then multiply by BLOCK_SIZE
  // Width: proportional to file's share of total, with a target aspect ratio
  // Height: mountain shape — proportional to sqrt(lines), in block units
  const maxBlocks = maxValue;
  const maxH_blocks = Math.ceil(Math.sqrt(maxBlocks) * 1.5); // tallest file in blocks

  for (const f of orderedFiles) {
    const hBlocks = Math.max(1, Math.round(maxH_blocks * Math.pow(f.value / maxValue, MOUNTAIN_ALPHA)));
    const wBlocks = Math.max(1, Math.ceil(f.value / hBlocks));
    f.h = hBlocks * BLOCK_SIZE;
    f.w = wBlocks * BLOCK_SIZE;
  }

  // --- Smooth heights: adjacent files can't differ by more than MAX_ADJ_HEIGHT_DIFF px ---
  for (let pass = 0; pass < 6; pass++) {
    const forward = pass % 2 === 0;
    const start = forward ? 0 : orderedFiles.length - 2;
    const end = forward ? orderedFiles.length - 1 : -1;
    const step = forward ? 1 : -1;
    for (let i = start; i !== end; i += step) {
      const a = orderedFiles[i], b = orderedFiles[i + 1];
      const diff = Math.abs(a.h - b.h);
      if (diff > MAX_ADJ_HEIGHT_DIFF) {
        const shorter = a.h < b.h ? a : b;
        const taller = a.h < b.h ? b : a;
        const oldH = shorter.h;
        shorter.h = taller.h - MAX_ADJ_HEIGHT_DIFF;
        // Snap to block grid
        shorter.h = Math.max(BLOCK_SIZE, Math.round(shorter.h / BLOCK_SIZE) * BLOCK_SIZE);
        // Recompute width to preserve line count
        const hBlocks = shorter.h / BLOCK_SIZE;
        const wBlocks = Math.max(1, Math.ceil(shorter.value / hBlocks));
        shorter.w = wBlocks * BLOCK_SIZE;
      }
    }
  }

  // --- Place left to right, vertically centered ---
  const totalW = orderedFiles.reduce((s, f) => s + f.w, 0);
  let curX = (canvasW - totalW) / 2;
  const midY = canvasH * 0.5;

  const placed = [];
  for (const f of orderedFiles) {
    f.x = curX;
    f.y = midY - f.h / 2;
    curX += f.w;
    placed.push(f);
  }

  return { files: placed };
}

// ===================== EASING =====================
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Geological easing: slow heavy start (pressure building), then movement, long settle
function easeTectonic(t) {
  // Slow start (0-30%), accelerate (30-60%), decelerate with micro-overshoot and long settle (60-100%)
  if (t < 0.3) {
    // Slow pressure build — quintic ease-in
    const s = t / 0.3;
    return 0.15 * (s * s * s * s * s);
  } else if (t < 0.6) {
    // Main movement
    const s = (t - 0.3) / 0.3;
    return 0.15 + 0.7 * (s * (2 - s)); // ease-out quadratic within this phase
  } else {
    // Long settle with tiny overshoot
    const s = (t - 0.6) / 0.4;
    const overshoot = Math.sin(s * Math.PI) * 0.03 * (1 - s);
    return 0.85 + 0.15 * (s * s * (3 - 2 * s)) + overshoot;
  }
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ===================== TRANSITION SYSTEM =====================
function buildTransitionMap(prev, next) {
  const prevMap = new Map();
  const nextMap = new Map();

  if (prev) for (const f of prev.files) prevMap.set(f.path, f);
  if (next) for (const f of next.files) nextMap.set(f.path, f);

  const continuing = [];
  const entering = [];
  const exiting = [];

  // Files in both layouts
  for (const [path, nf] of nextMap) {
    const pf = prevMap.get(path);
    if (pf) {
      continuing.push({ path, from: { x: pf.x, y: pf.y, w: pf.w, h: pf.h }, to: { x: nf.x, y: nf.y, w: nf.w, h: nf.h }, fileData: nf });
    } else {
      entering.push({ path, to: { x: nf.x, y: nf.y, w: nf.w, h: nf.h }, fileData: nf });
    }
  }

  // Files only in previous
  for (const [path, pf] of prevMap) {
    if (!nextMap.has(path)) {
      exiting.push({ path, from: { x: pf.x, y: pf.y, w: pf.w, h: pf.h }, fileData: pf });
    }
  }

  // Compute center of changed files (for ripple delays)
  const changedCenters = [];
  for (const e of entering) changedCenters.push({ cx: e.to.x + e.to.w / 2, cy: e.to.y + e.to.h / 2 });
  for (const e of exiting) changedCenters.push({ cx: e.from.x + e.from.w / 2, cy: e.from.y + e.from.h / 2 });
  for (const c of continuing) {
    const dx = c.to.x - c.from.x, dy = c.to.y - c.from.y, dw = c.to.w - c.from.w, dh = c.to.h - c.from.h;
    if (Math.abs(dw) > 2 || Math.abs(dh) > 2) {
      changedCenters.push({ cx: c.to.x + c.to.w / 2, cy: c.to.y + c.to.h / 2 });
    }
  }

  // Assign delay to continuing files based on distance to nearest changed file
  for (const c of continuing) {
    const fx = (c.from.x + c.to.x) / 2 + (c.from.w + c.to.w) / 4;
    const fy = (c.from.y + c.to.y) / 2 + (c.from.h + c.to.h) / 4;
    let minDist = Infinity;
    for (const cc of changedCenters) {
      const d = Math.hypot(fx - cc.cx, fy - cc.cy);
      if (d < minDist) minDist = d;
    }
    c.delay = changedCenters.length > 0 ? Math.min(0.3, minDist * 0.0008) : 0;
  }

  return { continuing, entering, exiting };
}

function buildInterpolatedLayout(tMap, t) {
  // t is already eased by the caller (easeInOutCubic from tick)
  const dimMap = new Map();

  // Compute target total width (lerp between prev and next totals)
  let prevTotalW = 0, nextTotalW = 0;
  for (const c of tMap.continuing) { prevTotalW += c.from.w; nextTotalW += c.to.w; }
  for (const e of tMap.entering) { nextTotalW += e.to.w; }
  for (const e of tMap.exiting) { prevTotalW += e.from.w; }
  const targetTotalW = prevTotalW + (nextTotalW - prevTotalW) * t;

  // Continuing files — width in lockstep, height with ripple delay
  for (const c of tMap.continuing) {
    const ht = clamp((t - c.delay * 0.3) / (1 - c.delay * 0.3), 0, 1);
    dimMap.set(c.path, {
      fileData: c.fileData,
      w: c.from.w + (c.to.w - c.from.w) * t,
      h: c.from.h + (c.to.h - c.from.h) * ht,
      _entering: false,
      _exiting: false,
      _transitionT: t,
    });
  }

  // Entering files — grow in
  for (const e of tMap.entering) {
    const growT = clamp((t - 0.1) / 0.7, 0, 1);
    dimMap.set(e.path, {
      fileData: e.fileData,
      w: e.to.w * t,
      h: e.to.h * growT,
      _entering: true,
      _exiting: false,
      _transitionT: t,
    });
  }

  // Exiting files — shrink out
  for (const e of tMap.exiting) {
    dimMap.set(e.path, {
      fileData: e.fileData,
      w: e.from.w * (1 - t),
      h: e.from.h * (1 - t),
      _entering: false,
      _exiting: true,
      _transitionT: t,
    });
  }

  // Collect ordered files with their interpolated dims
  const orderedDims = [];
  for (const path of stableFileOrder) {
    const d = dimMap.get(path);
    if (d && d.w >= 0.5) orderedDims.push(d);
  }

  // Normalize widths so they sum exactly to targetTotalW — eliminates gaps
  const rawTotalW = orderedDims.reduce((s, d) => s + d.w, 0);
  if (rawTotalW > 0) {
    const scale = targetTotalW / rawTotalW;
    for (const d of orderedDims) d.w *= scale;
  }

  // Place contiguously, vertically centered
  const files = [];
  const midY = canvas.height * 0.5;
  const finalTotalW = orderedDims.reduce((s, d) => s + d.w, 0);
  let curX = (canvas.width - finalTotalW) / 2;

  for (const d of orderedDims) {
    if (d.h < 0.5) { curX += d.w; continue; }
    files.push({
      ...d.fileData,
      x: curX,
      y: midY - d.h / 2,
      w: d.w,
      h: d.h,
      _entering: d._entering,
      _exiting: d._exiting,
      _transitionT: d._transitionT,
    });
    curX += d.w;
  }

  return { files };
}

// ===================== COLOR =====================
function ageToColor(normalizedAge) {
  const t = Math.max(0, Math.min(1, normalizedAge));

  for (let i = 0; i < AGE_STAGES.length - 1; i++) {
    if (t <= AGE_STAGES[i + 1].pos) {
      const a = AGE_STAGES[i], b = AGE_STAGES[i + 1];
      const f = (t - a.pos) / (b.pos - a.pos);
      return {
        r: Math.round(a.r + (b.r - a.r) * f),
        g: Math.round(a.g + (b.g - a.g) * f),
        b: Math.round(a.b + (b.b - a.b) * f),
      };
    }
  }
  const last = AGE_STAGES[AGE_STAGES.length - 1];
  return { r: last.r, g: last.g, b: last.b };
}

function colorToCSS(c) {
  return `rgb(${c.r},${c.g},${c.b})`;
}

function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}

// ===================== RENDERING =====================
function resizeCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}

// ===================== SCALING =====================
// With fixed BLOCK_SIZE, the island's natural pixel size varies per frame.
// We need to scale it to fit the canvas viewport.

// Cache island bounds per frame (set after computeTreemap)
let islandBoundsCache = new Map(); // frameIdx -> { w, h }

function getIslandBounds(layout) {
  if (!layout || !layout.files.length) return { w: 100, h: 100 };
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const f of layout.files) {
    minX = Math.min(minX, f.x);
    maxX = Math.max(maxX, f.x + f.w);
    minY = Math.min(minY, f.y);
    maxY = Math.max(maxY, f.y + f.h);
  }
  return { w: maxX - minX, h: maxY - minY };
}

function getFitScale(islandW, islandH) {
  // Scale to fit island in 80% of canvas
  const targetW = canvas.width * 0.8;
  const targetH = canvas.height * 0.8;
  return Math.min(targetW / islandW, targetH / islandH, 3.0); // cap at 3x
}

function getFrameScale(frameIdx) {
  if (vizMode === 'growth') {
    // Growth: final frame fills canvas. Earlier frames use same scale → appear smaller.
    // Compute scale from final frame's island bounds.
    const finalBounds = islandBoundsCache.get(snapshots.length - 1);
    if (!finalBounds) return 1.0;
    return getFitScale(finalBounds.w, finalBounds.h);
  } else {
    // Dolly zoom: camera pulls back at constant rate over continuous time.
    // zoomOutProgress (0..1) advances smoothly during playback, not per frame.
    const bounds0 = islandBoundsCache.get(0);
    const boundsF = islandBoundsCache.get(snapshots.length - 1);
    if (!bounds0 || !boundsF) return 1.0;
    const scale0 = getFitScale(bounds0.w, bounds0.h);
    const scaleF = getFitScale(boundsF.w, boundsF.h);
    return scale0 + (scaleF - scale0) * zoomOutProgress;
  }
}

function drawTextLabels(activeLayout, scale) {
  if (!showTextLabels) return;
  ctx.save();
  for (const file of activeLayout.files) {
    const effectiveW = file.w * scale;
    if (effectiveW < 40) continue;
    const filename = file.path.split('/').pop();
    const fontSize = Math.max(8, Math.min(12, effectiveW / filename.length * 1.2));
    ctx.font = `${fontSize / scale}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(filename, file.x + file.w / 2, file.y + file.h / 2, file.w * 0.9);
  }
  ctx.restore();
}

function computeMedianLifespan(snapshot) {
  // Compute the median time span between the oldest and newest lines across all files
  const dates = [];
  for (const file of Object.values(snapshot.files)) {
    for (const line of file.blame) {
      dates.push(new Date(line.date).getTime());
    }
  }
  if (dates.length === 0) return 1;
  const sorted = dates.sort((a, b) => a - b);
  const range = sorted[sorted.length - 1] - sorted[0];
  return Math.max(range, 24 * 60 * 60 * 1000); // at least 1 day
}

function drawOcean() {
  ctx.fillStyle = OCEAN_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle ocean texture — sparse dots
  const now = performance.now();
  ctx.fillStyle = 'rgba(25,25,80,0.4)';
  const seed = Math.floor(now / 3000);
  for (let i = 0; i < 80; i++) {
    const hash = (seed * 31 + i * 97) & 0xFFFF;
    const x = (hash * 7 + i * 131) % canvas.width;
    const y = (hash * 13 + i * 67) % canvas.height;
    const sz = 1 + (hash % 3);
    const alpha = 0.15 + 0.1 * Math.sin(now / 2000 + i);
    ctx.globalAlpha = alpha;
    ctx.fillRect(x, y, sz, sz);
  }
  ctx.globalAlpha = 1;
}

function drawIsland(repoTime, now, renderLayout) {
  const activeLayout = renderLayout;
  if (!activeLayout) return;

  const currentDate = repoTime;
  // Use the snapshot closest to repoTime for lifespan calculation
  const snap = snapshots[currentFrame] || snapshots[0];
  const lifespan = computeMedianLifespan(snap);

  const LAVA_COLOR_DARK = { r: 180, g: 30, b: 20 };
  const LAVA_COLOR_BRIGHT = { r: 220, g: 120, b: 30 };
  const GROWTH_COLOR = { r: 46, g: 255, b: 100 };

  // First pass: draw glow behind exiting files
  for (const file of activeLayout.files) {
    if (!file._exiting || file.w < 1 || file.h < 1) continue;
    const t = file._transitionT || 0;
    const glowAlpha = 0.25 * (1 - t);
    if (glowAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = glowAlpha;
      ctx.fillStyle = colorToCSS(LAVA_COLOR_BRIGHT);
      ctx.fillRect(file.x - 3, file.y - 3, file.w + 6, file.h + 6);
      ctx.restore();
    }
  }

  // Second pass: draw all file blocks
  for (const file of activeLayout.files) {
    if (file.w < 2 || file.h < 2) continue;

    // Fill entire file rect first to avoid sub-block ocean gaps
    const tint = FOLDER_TINTS[file.folderIdx % FOLDER_TINTS.length];
    const cols = Math.max(1, Math.round(file.w / BLOCK_SIZE));
    const rows = Math.max(1, Math.round(file.h / BLOCK_SIZE));
    const blockW = BLOCK_SIZE; // fixed block size
    const blockH = BLOCK_SIZE; // fixed block size
    const totalBlocks = cols * rows;
    const linesPerBlock = Math.max(1, file.lines / totalBlocks);

    // For entering files, compute reveal radius from center
    const fileCx = file.w / 2;
    const fileCy = file.h / 2;
    const maxRadius = Math.hypot(fileCx, fileCy);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const bx = file.x + c * blockW;
        const by = file.y + r * blockH;

        // For entering files: progressive reveal from center
        if (file._entering) {
          const t = file._transitionT || 0;
          const bcx = (c + 0.5) * blockW;
          const bcy = (r + 0.5) * blockH;
          const dist = Math.hypot(bcx - fileCx, bcy - fileCy);
          const revealRadius = maxRadius * clamp(t * 1.5, 0, 1);
          if (dist > revealRadius) continue;
        }

        const blockIndex = r * cols + c;
        const lineStart = Math.floor(blockIndex * linesPerBlock);
        const lineEnd = Math.min(Math.floor((blockIndex + 1) * linesPerBlock), file.lines);

        // Find the most recent date in this block's line range
        let newestDate = 0;
        for (let l = lineStart; l < lineEnd && l < file.blame.length; l++) {
          const d = new Date(file.blame[l].date).getTime();
          if (d > newestDate) newestDate = d;
        }
        if (newestDate === 0 && file.blame.length > 0) {
          newestDate = new Date(file.blame[0].date).getTime();
        }

        const age = (currentDate - newestDate) / lifespan;
        let color = ageToColor(age);

        // Apply folder tint
        color = {
          r: Math.max(0, Math.min(255, color.r + tint.r)),
          g: Math.max(0, Math.min(255, color.g + tint.g)),
          b: Math.max(0, Math.min(255, color.b + tint.b)),
        };

        // Tectonic effects
        if (file._exiting) {
          const t = file._transitionT || 0;
          const bcx = (c + 0.5) * blockW;
          const bcy = (r + 0.5) * blockH;
          const dist = Math.hypot(bcx - fileCx, bcy - fileCy) / maxRadius;
          const burnProgress = clamp(t * 2 - dist * 0.5, 0, 1);
          const lavaColor = lerpColor(LAVA_COLOR_DARK, LAVA_COLOR_BRIGHT, burnProgress);
          color = lerpColor(color, lavaColor, clamp(t * 1.8, 0, 1));
        } else if (file._entering) {
          const t = file._transitionT || 0;
          const intensity = clamp(1 - t * 1.2, 0, 0.7);
          color = lerpColor(color, GROWTH_COLOR, intensity);
        }

        ctx.fillStyle = colorToCSS(color);
        ctx.fillRect(bx, by, Math.ceil(blockW), Math.ceil(blockH));
      }
    }

    // Draw thin border around file
    ctx.strokeStyle = 'rgba(25,25,66,0.3)';
    ctx.lineWidth = FILE_BORDER;
    ctx.strokeRect(file.x, file.y, file.w, file.h);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPRBanner(pr, now, startTime) {
  const elapsed = now - startTime;
  const duration = 2000;
  if (elapsed > duration) return;

  const t = elapsed / duration;
  const alpha = t < 0.2 ? t / 0.2 : t > 0.7 ? (1 - t) / 0.3 : 1;

  ctx.save();
  ctx.globalAlpha = alpha * 0.9;
  ctx.fillStyle = '#161b22';
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1;

  const text = `PR #${pr.number}: ${pr.title}`;
  ctx.font = '14px JetBrains Mono, Fira Code, Courier New, monospace';
  const tw = ctx.measureText(text).width;
  const bw = tw + 32;
  const bh = 36;
  const bx = (canvas.width - bw) / 2;
  const by = canvas.height * 0.15;

  roundRect(ctx, bx, by, bw, bh, 6);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#58a6ff';
  ctx.fillText(text, bx + 16, by + 23);
  ctx.restore();
}

// ===================== ANIMATION =====================
let prBanner = null; // {pr, startTime}

function tick(timestamp) {
  requestAnimationFrame(tick);
  if (!lastTimestamp) lastTimestamp = timestamp;
  const dt = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  if (snapshots.length === 0) {
    drawOcean();
    return;
  }

  // Advance film time
  if (playing) {
    filmTime += dt;
    if (filmTime >= filmDuration) {
      filmTime = filmDuration;
      playing = false;
      updatePlayButton();
    }
  }

  // Map film time to snapshot indices and interpolation
  const { prevIdx, nextIdx, t, repoTime } = getTimeMapping(filmTime);
  ensureLayoutCache(prevIdx, nextIdx);

  // Derive current frame for UI
  const oldFrame = currentFrame;
  currentFrame = t < 0.5 ? prevIdx : nextIdx;

  // PR banner on frame change
  if (currentFrame > oldFrame && snapshots[currentFrame].pr) {
    prBanner = { pr: snapshots[currentFrame].pr, startTime: performance.now() };
  }

  // Build interpolated layout
  let renderLayout;
  if (cachedTransitionMap) {
    renderLayout = buildInterpolatedLayout(cachedTransitionMap, easeInOutCubic(t));
  } else {
    renderLayout = cachedPrevLayout;
  }

  // Dolly zoom progress
  zoomOutProgress = filmTime / filmDuration;

  // Compute render scale
  if (vizMode === 'zoomout') {
    currentRenderScale = getFrameScale(currentFrame);
  } else {
    // Growth: interpolate scale between prev and next frame bounds
    const prevScale = getFrameScale(prevIdx);
    const nextScale = getFrameScale(nextIdx);
    currentRenderScale = prevScale + (nextScale - prevScale) * easeInOutCubic(t);
  }

  // Render
  drawOcean();
  if (renderLayout) {
    ctx.save();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.translate(cx, cy);
    ctx.scale(currentRenderScale, currentRenderScale);
    ctx.translate(-cx, -cy);
    drawIsland(repoTime, timestamp, renderLayout);
    drawTextLabels(renderLayout, currentRenderScale);
    ctx.restore();
  }
  if (prBanner && timestamp - prBanner.startTime < 2500) {
    drawPRBanner(prBanner.pr, timestamp, prBanner.startTime);
  }

  // Update sidebar
  updateUI();
}

function updateUI() {
  if (!snapshots.length) return;
  const snap = snapshots[currentFrame];

  // Timeline slider
  const slider = document.getElementById('timeline');
  slider.value = Math.round((filmTime / filmDuration) * 1000);

  // Time display
  const timeDisplay = document.getElementById('time-display');
  if (timeDisplay) {
    timeDisplay.textContent = `${formatFilmTime(filmTime)} / ${formatFilmTime(filmDuration)}`;
  }

  // Commit info
  document.getElementById('commit-msg').textContent = snap.message;
  document.getElementById('date-display').textContent = new Date(snap.date).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
  });

  const fileCount = Object.keys(snap.files).length;
  const totalLines = Object.values(snap.files).reduce((s, f) => s + f.lines, 0);

  document.getElementById('info-files').textContent = fileCount;
  document.getElementById('info-lines').textContent = totalLines.toLocaleString();
  document.getElementById('info-commits').textContent = snapshots.length;
  document.getElementById('info-frame').textContent = `${currentFrame + 1}/${snapshots.length}`;
}

function updatePlayButton() {
  document.getElementById('play-btn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
}

// ===================== INTERACTION =====================
function setupControls() {
  const playBtn = document.getElementById('play-btn');
  const slider = document.getElementById('timeline');

  playBtn.addEventListener('click', () => {
    if (filmTime >= filmDuration && !playing) {
      // Restart from beginning
      seekToFilmTime(0);
    }
    playing = !playing;
    updatePlayButton();
  });

  slider.addEventListener('input', () => {
    const frac = parseInt(slider.value) / 1000;
    playing = false;
    updatePlayButton();
    seekToFilmTime(frac * filmDuration);
  });

  // Duration selector
  document.getElementById('duration-select').addEventListener('change', (e) => {
    const oldFrac = filmDuration > 0 ? filmTime / filmDuration : 0;
    filmDuration = parseInt(e.target.value);
    filmTime = oldFrac * filmDuration; // preserve position
    cachedPrevIdx = -1; // invalidate cache
    cachedNextIdx = -1;
  });

  // Playback mode selector
  document.getElementById('playback-mode').addEventListener('change', (e) => {
    const oldFrac = filmDuration > 0 ? filmTime / filmDuration : 0;
    playbackMode = e.target.value;
    filmTime = oldFrac * filmDuration; // preserve position
    cachedPrevIdx = -1;
    cachedNextIdx = -1;
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      playBtn.click();
    } else if (e.code === 'ArrowRight') {
      playing = false;
      updatePlayButton();
      if (playbackMode === 'percommit') {
        seekToCommit(currentFrame + 1);
      } else {
        seekToFilmTime(filmTime + 1000); // +1s
      }
    } else if (e.code === 'ArrowLeft') {
      playing = false;
      updatePlayButton();
      if (playbackMode === 'percommit') {
        seekToCommit(currentFrame - 1);
      } else {
        seekToFilmTime(filmTime - 1000); // -1s
      }
    }
  });

  // Tooltip on hover
  canvas.addEventListener('mousemove', (e) => {
    const tooltip = document.getElementById('tooltip');
    const activeLayout = cachedPrevLayout;
    if (!activeLayout) { tooltip.style.display = 'none'; return; }

    const rect = canvas.getBoundingClientRect();
    const canvasX = e.clientX - rect.left;
    const canvasY = e.clientY - rect.top;

    // Invert scale transform to get layout coordinates
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const scale = currentRenderScale;
    const mx = (canvasX - cx) / scale + cx;
    const my = (canvasY - cy) / scale + cy;

    let found = null;
    for (const file of activeLayout.files) {
      if (mx >= file.x && mx <= file.x + file.w && my >= file.y && my <= file.y + file.h) {
        found = file;
        break;
      }
    }

    if (found) {
      hoveredFile = found.path;
      tooltip.innerHTML = `
        <div class="filepath">${found.path}</div>
        <div class="detail">${found.lines} lines · ${found.folder}/</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';

      const tr = tooltip.getBoundingClientRect();
      if (tr.right > window.innerWidth) {
        tooltip.style.left = (e.clientX - tr.width - 12) + 'px';
      }
      if (tr.bottom > window.innerHeight) {
        tooltip.style.top = (e.clientY - tr.height - 8) + 'px';
      }
    } else {
      hoveredFile = null;
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
    hoveredFile = null;
  });

  // Resize
  const resizeObserver = new ResizeObserver(() => {
    resizeCanvas();
    if (snapshots.length > 0) {
      islandBoundsCache.clear();
      cachedPrevIdx = -1;
      cachedNextIdx = -1;
      // Precompute bounds for first and last frames
      const l0 = computeTreemap(snapshots[0].files, canvas.width, canvas.height);
      islandBoundsCache.set(0, getIslandBounds(l0));
      const lF = computeTreemap(snapshots[snapshots.length - 1].files, canvas.width, canvas.height);
      islandBoundsCache.set(snapshots.length - 1, getIslandBounds(lF));
    }
  });
  resizeObserver.observe(document.getElementById('canvas-wrapper'));

  // Display controls
  document.getElementById('viz-mode').addEventListener('change', (e) => {
    vizMode = e.target.value;
  });
  document.getElementById('text-toggle').addEventListener('change', (e) => {
    showTextLabels = e.target.checked;
  });
}

// ===================== INIT =====================
async function init() {
  setupControls();
  requestAnimationFrame(tick);

  try {
    repoData = await loadData();

    // Build snapshots
    snapshots = buildSnapshots(repoData);
    console.log(`Built ${snapshots.length} snapshots`);

    // Build stable file order from final snapshot
    stableFileOrder = buildStableOrder(snapshots);

    // Compute commit dates for time mapping
    commitDates = snapshots.map(s => new Date(s.date).getTime());
    repoStartDate = commitDates[0] || 0;
    repoEndDate = commitDates[commitDates.length - 1] || 0;

    // Precompute total lines per frame for scaling
    totalLinesPerFrame = snapshots.map(snap =>
      Object.values(snap.files).reduce((s, f) => s + f.lines, 0)
    );
    finalFrameTotalLines = totalLinesPerFrame[totalLinesPerFrame.length - 1] || 1;

    // Setup UI
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('repo-name').textContent =
      `${repoData.repo.owner}/${repoData.repo.name}`;
    if (repoData.repo.truncated) {
      const h = document.getElementById('repo-name');
      const note = document.createElement('div');
      note.style.cssText = 'font-size:10px;font-weight:400;color:#f0883e;margin-top:2px';
      note.textContent = `showing ${repoData.repo.shownCommits.toLocaleString()} of ${repoData.repo.totalCommits.toLocaleString()} commits`;
      h.parentNode.appendChild(note);
    }

    // Size canvas after app is visible (wrapper needs layout)
    resizeCanvas();

    // Precompute island bounds for frame 0 and final frame (needed for zoom scaling)
    const layout0 = computeTreemap(snapshots[0].files, canvas.width, canvas.height);
    islandBoundsCache.set(0, getIslandBounds(layout0));
    const layoutF = computeTreemap(snapshots[snapshots.length - 1].files, canvas.width, canvas.height);
    islandBoundsCache.set(snapshots.length - 1, getIslandBounds(layoutF));

    // Start at beginning
    seekToFilmTime(0);

  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#f85149">Error: ${err.message}</div>
       <div style="font-size:13px;margin-top:8px"><a href="/" style="color:#58a6ff">← Back to home</a></div>`;
    console.error(err);
  }
}

init();
</script>
